# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches: [ test-any ]
  pull_request:
    branches: [ test-any ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "npp"
  npp:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    container: ghcr.io/pkgforge-dev/archlinux:latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - uses: actions/checkout@v7
      - name: Preparing Container
        uses: pkgforge-dev/anylinux-setup-action@0964f2258d6c93d1391359978dde081fd8b3c6af # v2
      - name: Install Dependencies
        run: /bin/sh ./get-dependencies.sh
      - name: Make AppImage
        run: /bin/sh ./make-appimage.sh stable
      - name: Release
        uses: slord399/action-automatic-releases@v2.0.4
        with:
          title: notepad-plus-plus test build
          automatic_release_tag: test-any
          prerelease: false
          draft: false
          files: dist/*AppImage*
          repo_token: ${{ secrets.GITHUB_TOKEN }}
